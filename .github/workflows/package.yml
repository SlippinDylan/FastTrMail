name: package-extension

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read extension version
        id: version
        run: |
          echo "value=$(node -p 'require(\"./extension/manifest.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: bash scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fasttrmail-${{ steps.version.outputs.value }}
          path: |
            dist/fasttrmail
            dist/fasttrmail.zip
            dist/fasttrmail-${{ steps.version.outputs.value }}.zip

      - name: Write workflow summary
        run: |
          {
            echo "## FastTrMail package"
            echo ""
            echo "- Version: \`${{ steps.version.outputs.value }}\`"
            echo "- Unpacked directory: \`dist/fasttrmail/\`"
            echo "- Latest zip: \`dist/fasttrmail.zip\`"
            echo "- Versioned zip: \`dist/fasttrmail-${{ steps.version.outputs.value }}.zip\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish latest release asset
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="$(mktemp)"
          {
            echo "Automated latest build from \`main\`."
            echo ""
            echo "- Version: \`${{ steps.version.outputs.value }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } > "$NOTES_FILE"

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest --title "Latest (${{ steps.version.outputs.value }})" --notes-file "$NOTES_FILE"
          else
            gh release create latest --title "Latest (${{ steps.version.outputs.value }})" --notes-file "$NOTES_FILE"
          fi

          gh release upload latest \
            "dist/fasttrmail.zip" \
            "dist/fasttrmail-${{ steps.version.outputs.value }}.zip" \
            --clobber

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" "dist/fasttrmail-${{ steps.version.outputs.value }}.zip" --generate-notes --title "${GITHUB_REF_NAME}"
