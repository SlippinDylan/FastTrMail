name: package-extension

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read extension version
        id: version
        run: |
          VERSION="$(python3 - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('extension/manifest.json').read_text())['version'])
          PY
          )"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Package extension
        run: bash scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fasttrmail-${{ steps.version.outputs.value }}
          path: |
            dist/fasttrmail
            dist/fasttrmail-${{ steps.version.outputs.value }}.zip

      - name: Write workflow summary
        run: |
          {
            echo "## FastTrMail package"
            echo ""
            echo "- Version: \`${VERSION}\`"
            echo "- Unpacked directory: \`dist/fasttrmail/\`"
            echo "- Release zip: \`dist/fasttrmail-${VERSION}.zip\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish latest release asset
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="$(mktemp)"
          {
            echo "Automated latest build from \`main\`."
            echo ""
            echo "- Version: \`${VERSION}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } > "$NOTES_FILE"

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest --title "Latest (${VERSION})" --notes-file "$NOTES_FILE"
          else
            gh release create latest --title "Latest (${VERSION})" --notes-file "$NOTES_FILE"
          fi

          gh release delete-asset latest "fasttrmail.zip" --yes >/dev/null 2>&1 || true

          gh release upload latest \
            "dist/fasttrmail-${VERSION}.zip" \
            --clobber

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" "dist/fasttrmail-${VERSION}.zip" --generate-notes --title "${GITHUB_REF_NAME}"
